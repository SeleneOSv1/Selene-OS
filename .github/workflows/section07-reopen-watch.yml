name: Section 07 Reopen Watch

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base:
        description: Base revision to compare
        required: true
        type: string
      head:
        description: Head revision to compare
        required: true
        type: string

permissions:
  contents: read

jobs:
  section07-reopen-watch:
    runs-on: ubuntu-latest
    outputs:
      section07_status: ${{ steps.publish.outputs.section07_status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Resolve Section 07 diff range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "SECTION07_BASE_SHA=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_ENV"
            echo "SECTION07_HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          else
            echo "SECTION07_BASE_SHA=${{ inputs.base }}" >> "$GITHUB_ENV"
            echo "SECTION07_HEAD_SHA=${{ inputs.head }}" >> "$GITHUB_ENV"
          fi

      - name: Run Section 07 reopen guardrail
        shell: bash
        run: |
          set -euo pipefail
          REPORT_PATH="$RUNNER_TEMP/section07_reopen_report.txt"
          STATUS_PATH="$RUNNER_TEMP/section07_reopen_status.txt"
          echo "SECTION07_REPORT_PATH=$REPORT_PATH" >> "$GITHUB_ENV"
          echo "SECTION07_STATUS_PATH=$STATUS_PATH" >> "$GITHUB_ENV"
          bash "$GITHUB_WORKSPACE/scripts/check_section07_reopen_watch.sh" --repo-root "$GITHUB_WORKSPACE" --base "$SECTION07_BASE_SHA" --head "$SECTION07_HEAD_SHA" --report-path "$REPORT_PATH" --status-path "$STATUS_PATH"

      - name: Publish Section 07 reopen report
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          section07_status="$(cat "$SECTION07_STATUS_PATH")"
          if [[ -z "${section07_status}" ]]; then
            echo "missing Section 07 status file output" >&2
            exit 1
          fi
          echo "section07_status=${section07_status}" >> "$GITHUB_OUTPUT"
          {
            echo "## Section 07 Reopen Report"
            echo
            echo "- Base: \`${SECTION07_BASE_SHA}\`"
            echo "- Head: \`${SECTION07_HEAD_SHA}\`"
            echo "- Status: \`${section07_status}\`"
            echo
            echo '```text'
            cat "$SECTION07_REPORT_PATH"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          case "$section07_status" in
            ProgramDReopenCandidate|ProgramEReopenCandidate)
              echo "::warning title=Section 07 reopen candidate detected::Scanner reported ${section07_status}. Review section07_reopen_report.txt before selecting the next build."
              ;;
            StillBlocked)
              ;;
            *)
              echo "unexpected Section 07 scanner status: ${section07_status}" >&2
              exit 1
              ;;
          esac

      - name: Upload Section 07 reopen report
        uses: actions/upload-artifact@v4
        with:
          name: section07-reopen-report
          path: ${{ env.SECTION07_REPORT_PATH }}
